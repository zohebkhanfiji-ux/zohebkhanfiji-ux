name: PR Compliance

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check PR title
        run: |
          echo "Validating PR title"
          test -n "${{ github.event.pull_request.title }}"

      - name: Check PR body sections
        run: |
          body='${{ github.event.pull_request.body }}'
          echo "$body" | grep -i "summary" || true
          echo "$body" | grep -i "changes" || true

      - name: Basic secret scan
        run: |
          echo "Scanning for secrets patterns"
          ! echo "${{ github.event.pull_request.body }}" | grep -i "api_key" || exit 0
