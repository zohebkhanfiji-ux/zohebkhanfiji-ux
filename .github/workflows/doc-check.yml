name: Documentation Check

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ensure docs exist
        run: |
          test -d docs
          test -f docs/PROJECT_BRIEF.md
          test -f docs/OPERATING_SYSTEM.md

      - name: List documentation files
        run: |
          find docs -type f
